site_name: "MIDAS Python"
site_author: "Sumit Shekhar"

extra_css:
  - stylesheets/extra.css

theme:
  # name: shadcn
  name : material
  favicon: assets/favicon.ico
  logo: assets/midas-logo_White.png
  custom_dir: overrides

  palette: 
    scheme: default
    primary: black
    accent: blue

  font:
    text: Roboto Flex
    code: Fragment Mono
  features:
    - navigation.indexes
    - navigation.instant
    - toc.follow
    - navigation.top
    - search.suggest
    - navigation.path
    - content.code.copy
    - header.autohide
    - toc.follow
    - search.suggest
    - header.autohide
    - announce.dismiss
        

plugins:
  - search #¬Ýput it first to inject out custom code
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: auto
      height: auto
      zoomable: true
      draggable: true
      auto_caption: false
      caption_position: bottom
      background: white
      shadow: true
      manual: false

markdown_extensions:
 - admonition
 - toc:
      toc_depth: 3
 - tables
 - pymdownx.highlight
 - pymdownx.inlinehilite
 - pymdownx.superfences
 - pymdownx.snippets
 - pymdownx.details
 - md_in_html
 - attr_list
 - pymdownx.blocks.caption
     


copyright: "Created by Midas India :  MIDAS CIVIL NX - Python interface"


